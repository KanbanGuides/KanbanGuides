- id: join_discussion_description
  translation: "Engagez-vous avec la communauté, partagez vos idées et aidez à façonner l'avenir des guides Kanban. Vos contributions sont inestimables pour faire de ces guides des ressources complètes pour les praticiens de Kanban."

- id: guides_intro_text
  translation: "Apprenez ce qu'est Kanban et comment l'appliquer pour optimiser le flux de valeur à travers un processus. C'est votre ressource complète pour les connaissances et les pratiques Kanban. Kanban Guides est le foyer du Kanban Guide et de l'Open Guide to Kanban. C'est une référence gratuite et pilotée par la communauté pour l'application de Kanban dans le travail de la connaissance. Les guides définissent les pratiques de base, les métriques et les principes nécessaires pour améliorer le flux, optimiser la livraison de valeur et améliorer la durabilité de l'équipe. Ces guides soutiennent les adoptions de Kanban à grande échelle dans diverses industries et complètent d'autres approches agiles, lean et basées sur le flux."

