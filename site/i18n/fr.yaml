- id: open_source_title
  translation: "Open Source & Piloté par la Communauté"

- id: open_source_description
  translation: "L'Open Guide to Kanban est un projet open source qui prospère grâce à la collaboration communautaire. Que vous souhaitiez suggérer des améliorations, signaler des problèmes ou contribuer au contenu, nous accueillons votre participation. Le Kanban Guide n'est pas ouvert aux contributions ici, mais est inclus ici pour référence. Ensemble, nous pouvons rendre ces ressources encore plus précieuses pour la communauté Kanban dans le monde entier et pour quiconque souhaite améliorer le flux de valeur (potentielle et réalisée)."

